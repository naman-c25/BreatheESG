services:
  - type: web
    name: breathe-esg
    runtime: python
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: cd backend && gunicorn esg.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

databases:
  - name: breathe-esg-db
    plan: free
    region: oregon
